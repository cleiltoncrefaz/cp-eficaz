<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Ranking Eficaz</title>

  <style>
    :root {
      --azul-crefaz: #163056;
      --azul-claro: #edf2f4;
      --laranja-crefaz: #ef6b22;
      --branco: #ffffff;
      --cinza-texto: #64748b;
      --vermelho: #b42318;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--azul-claro);
      color: var(--azul-crefaz);
      font-family: Arial, sans-serif;
    }

    .ranking-section {
      min-height: 100vh;
      padding: 60px 20px;
    }

    .ranking-container {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }

    .ranking-header {
      margin-bottom: 32px;
      text-align: center;
    }

    .ranking-header h1 {
      margin: 0 0 12px;
      font-size: 42px;
    }

    .ranking-header p {
      margin: 0;
      color: var(--cinza-texto);
      font-size: 18px;
    }

    .ranking-controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .ranking-filter {
      min-width: 130px;
      padding: 12px 20px;
      border: 2px solid var(--azul-crefaz);
      border-radius: 100px;
      background: transparent;
      color: var(--azul-crefaz);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .ranking-filter.active,
    .ranking-filter:hover {
      background: var(--azul-crefaz);
      color: var(--branco);
    }

    .ranking-reference {
      margin-bottom: 24px;
      text-align: center;
      color: var(--laranja-crefaz);
      font-size: 22px;
      font-weight: 700;
    }

    .ranking-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .ranking-card {
      position: relative;
      min-height: 300px;
      padding: 28px 24px;
      overflow: hidden;
      border-radius: 22px;
      background: var(--branco);
      box-shadow: 0 14px 35px rgba(22, 48, 86, 0.1);
    }

    .ranking-position {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      padding: 8px 14px;
      border-radius: 100px;
      background: var(--laranja-crefaz);
      color: var(--branco);
      font-size: 14px;
      font-weight: 700;
    }

    .ranking-channel {
      display: block;
      margin-bottom: 10px;
      color: var(--laranja-crefaz);
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .ranking-card h2 {
      margin: 0 0 10px;
      font-size: 25px;
      line-height: 1.15;
    }

    .ranking-category {
      margin: 0 0 20px;
      color: var(--cinza-texto);
      font-size: 16px;
    }

    .ranking-cpf {
      margin: 0 0 18px;
      color: var(--cinza-texto);
      font-size: 14px;
    }

    .ranking-indicator {
      margin-top: auto;
      color: var(--azul-crefaz);
      font-size: 32px;
      font-weight: 800;
    }

    .ranking-indicator span {
      display: block;
      margin-top: 4px;
      color: var(--cinza-texto);
      font-size: 13px;
      font-weight: 400;
    }

    .ranking-status {
      grid-column: 1 / -1;
      padding: 30px;
      border-radius: 18px;
      background: var(--branco);
      text-align: center;
      color: var(--cinza-texto);
    }

    .ranking-error {
      color: var(--vermelho);
    }

    .ranking-updated {
      margin-top: 24px;
      text-align: center;
      color: var(--cinza-texto);
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .ranking-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .ranking-section {
        padding: 40px 18px;
      }

      .ranking-header h1 {
        font-size: 34px;
      }

      .ranking-grid {
        grid-template-columns: 1fr;
      }

      .ranking-filter {
        flex: 1;
      }
    }
  </style>
</head>

<body>

  <section class="ranking-section">

    <div class="ranking-container">

      <header class="ranking-header">
        <h1>Ranking Eficaz</h1>

        <p>
          Confira os destaques dos canais da Crefaz.
        </p>
      </header>

      <div class="ranking-controls">

        <button
          type="button"
          class="ranking-filter active"
          data-periodo="mensal"
        >
          Mensal
        </button>

        <button
          type="button"
          class="ranking-filter"
          data-periodo="anual"
        >
          Anual
        </button>

      </div>

      <div
        class="ranking-reference"
        id="rankingReference"
      ></div>

      <div
        class="ranking-grid"
        id="rankingGrid"
      >
        <div class="ranking-status">
          Carregando ranking...
        </div>
      </div>

      <div
        class="ranking-updated"
        id="rankingUpdated"
      ></div>

    </div>

  </section>

  <script>
    const API_RANKING =
      "https://script.google.com/macros/s/AKfycbwFeUyTXSvvzxEwWmBU5s95SJess7T-WDUomgXcwR9_NpSzf3jXRawD11oLUTCYnAE_LA/exec";

    const rankingGrid =
      document.getElementById("rankingGrid");

    const rankingReference =
      document.getElementById("rankingReference");

    const rankingUpdated =
      document.getElementById("rankingUpdated");

    const filterButtons =
      document.querySelectorAll(".ranking-filter");

    let todosOsDados = [];
    let periodoAtual = "mensal";

    async function carregarRanking() {
      mostrarCarregamento();

      try {
        const response = await fetch(API_RANKING, {
          method: "GET",
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error(
            `Erro ao consultar ranking: ${response.status}`
          );
        }

        const resultado = await response.json();

        if (!resultado.sucesso) {
          throw new Error(
            resultado.mensagem ||
            "O Apps Script retornou um erro."
          );
        }

        todosOsDados = Array.isArray(resultado.dados)
          ? resultado.dados
          : [];

        renderizarRanking(periodoAtual);

        if (resultado.atualizadoEm) {
          const dataAtualizacao =
            new Date(resultado.atualizadoEm);

          rankingUpdated.textContent =
            `Dados consultados em ${dataAtualizacao.toLocaleString("pt-BR")}.`;
        }

      } catch (erro) {
        console.error(erro);

        rankingGrid.innerHTML = `
          <div class="ranking-status ranking-error">
            Não foi possível carregar o ranking neste momento.
          </div>
        `;

        rankingReference.textContent = "";
        rankingUpdated.textContent = "";
      }
    }

    function renderizarRanking(periodo) {
      const dadosFiltrados = todosOsDados.filter(item => {
        return normalizarTexto(item.periodo) === periodo;
      });

      if (!dadosFiltrados.length) {
        rankingGrid.innerHTML = `
          <div class="ranking-status">
            Não existem dados para o ranking ${periodo}.
          </div>
        `;

        rankingReference.textContent = "";
        return;
      }

      rankingReference.textContent =
        dadosFiltrados[0].referencia || "";

      rankingGrid.innerHTML = dadosFiltrados
        .map(criarCard)
        .join("");
    }

    function criarCard(item) {
      return `
        <article class="ranking-card">

          <span class="ranking-position">
            1º lugar
          </span>

          <span class="ranking-channel">
            ${escaparHtml(item.canal)}
          </span>

          <h2>
            ${escaparHtml(item.nome)}
          </h2>

          <p class="ranking-category">
            ${escaparHtml(item.categoria)}
          </p>

          <p class="ranking-cpf">
            CPF: ${escaparHtml(item.cpf)}
          </p>

          <div class="ranking-indicator">
            ${escaparHtml(item.indicador)}

            <span>
              Pontuação/indicador
            </span>
          </div>

        </article>
      `;
    }

    function mostrarCarregamento() {
      rankingGrid.innerHTML = `
        <div class="ranking-status">
          Carregando ranking...
        </div>
      `;
    }

    function normalizarTexto(valor) {
      return String(valor || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function escaparHtml(valor) {
      return String(valor || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    filterButtons.forEach(button => {
      button.addEventListener("click", function () {
        filterButtons.forEach(item => {
          item.classList.remove("active");
        });

        this.classList.add("active");

        periodoAtual = this.dataset.periodo;

        renderizarRanking(periodoAtual);
      });
    });

    carregarRanking();
  </script>

</body>

</html>
