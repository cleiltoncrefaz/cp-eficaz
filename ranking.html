<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eficaz | Programa de excelência da Crefaz</title>

    <link rel="shortcut icon" href="assets/favicon-crefaz.ico" type="image/x-icon">
    <link rel="stylesheet" href="assets/font-anteb.css">

</head>

<!-- Global styles -->
<style>
    :root {
        --azul-escuro: #0d2041;
        --azul-crefaz: #163056;
        --azul-suave: #f2f4fb;
        --laranja-crefaz: #ef6b22;
        --laranja-escuro: #b14008;
        --text-footer: #b6cceb;
        --cinza: #d9e0e4;
        --cinza-suave: #edf2f4;
        --cinza-claro: #fafdff;

        --verde-success: #eaf8ef;
        --text-success: #1d6b3b;
    }

    html {
        scroll-behavior: smooth;
    }



    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        padding: 0;
        scroll-behavior: smooth;
        font-family: 'Anteb', sans-serif;
        overflow-x: hidden;
    }

    .container {
        max-width: 1100px;
        margin: 0 auto;
        display: flex;
        flex-wrap: wrap;
        gap: 30px;
        justify-content: center;
    }

    ::selection {
        background: #4dbeffbb;
        color: #ffffff;
    }

    /* Textos */


    h1 {
        font-size: 45px;
        font-weight: 600;
        line-height: 1.4;
    }

    h2 {
        font-size: 3rem;
        color: var(--azul-crefaz);
        text-align: center;
        letter-spacing: -3%;
        margin: 0;
        padding: 0 0 30px 0;
        font-weight: normal;
    }

    h3 {
        font-size: 1.8rem;
        color: var(--azul-crefaz);
        font-weight: 500;
        line-height: 1.2;
        letter-spacing: -3%;
        margin: 0px 0 20px 0;
    }

    h4 {
        font-size: 1.5rem;
        color: var(--azul-crefaz);
        line-height: 1.4;
        font-weight: 400;
        padding: 0;
        margin: 0 0 20px 0;
        letter-spacing: -3%;
    }

    p {
        font-size: 1.1rem;
        color: var(--azul-crefaz);
        font-weight: 300;
        line-height: 1.4;
        padding: 0;
        margin: 0 0 20px 0;
        letter-spacing: -1%;
    }

    ul {
        list-style: none;
        padding: 0;
        margin: 0;
        text-align: left;
    }

    li {
        font-size: 1.1rem;
        color: var(--azul-crefaz);
        padding-left: 10px;
        margin-bottom: 12px;
        position: relative;
        font-weight: 300;
        letter-spacing: -1%;
    }

    li::before {
        content: "•";
        position: absolute;
        left: 0;
        color: var(--laranja-crefaz);
        font-weight: bolder;
        vertical-align: top;
    }

    a {
        color: var(--laranja-crefaz);
        text-decoration: none;
        letter-spacing: -1%;
    }

    iframe {
        font-family: 'Anteb', sans-serif;
    }

    strong {
        font-weight: 700;
    }

    .highlight {
        color: var(--laranja-crefaz);
        font-weight: bold;
    }

    .darklight {
        color: var(--azul-crefaz);
        font-weight: bold;
    }

    /* Buttons */

    .btn {
        font-size: 1.2rem;
        border: none;
        display: flex;
        justify-content: center;
        gap: 20px;
        align-items: center;
        border-radius: 100px;
        padding: 18px 20px;
        cursor: pointer;
        font-family: 'Anteb', sans-serif;
        width: 300px;
        height: 50px;
        text-decoration: none;
    }

    .btn-primary {
        background: var(--azul-crefaz);
        color: #fff;
        margin: 0 auto;
    }

    .icon-btn-primary {
        fill: var(--laranja-crefaz);
        width: 18px;
        height: 18px;
    }

    .btn-secondary {
        background: var(--laranja-crefaz);
        color: #fff;
    }

    .btn-secondary-outline {
        background: transparent;
        border: 2px solid var(--laranja-crefaz);
        color: var(--laranja-crefaz);
    }

    .icon-btn-secondary {
        fill: #fff;
        width: 18px;
        height: 18px;
    }

    .btn-primary:hover {
        filter: brightness(1.2);
    }

    .btn-secondary:hover,
    .btn-secondary-outline:hover {
        filter: brightness(0.9);
    }
</style>

    <!-- Planilha -->
    <section id="ranking" style="align-content: center;">

        <style>
            #ranking {
                background: var(--azul-suave);
                height: fit-content;
                min-height: 80vh;
                padding: 50px 0;
            }

            #ranking h1 {
                color: var(--azul-crefaz);
                padding: 0;
                margin: 0;
                text-align: center;
            }

            .ranking-header {
                width: 100%;
            }

            .ranking-header p {
                text-align: center;
                margin: 0;
            }

            .ranking-tabs {
                width: fit-content;
                max-width: 100%;
                margin: 0px auto;
                padding: 6px;

                display: flex;
                align-items: center;
                justify-content: center;
                gap: 6px;

                background: #ffffff;
                border: 1px solid var(--cinza);
                border-radius: 100px;
                box-shadow: 0 8px 25px rgba(22, 48, 86, 0.08);
            }

            .ranking-tab {
                min-width: 190px;
                min-height: 48px;
                padding: 12px 24px;

                border: none;
                border-radius: 100px;

                background: transparent;
                color: var(--azul-crefaz);

                font-family: 'Anteb', sans-serif;
                font-size: 1.2rem;
                font-weight: 400;

                cursor: pointer;
                transition:
                    background 0.25s ease,
                    color 0.25s ease,
                    transform 0.25s ease;
            }

            .ranking-tab:hover {
                background: var(--azul-suave);
            }

            .ranking-tab.active {
                background: var(--azul-crefaz);
                color: #ffffff;
            }

            .ranking-tab:focus-visible {
                outline: 3px solid rgba(239, 107, 34, 0.35);
                outline-offset: 3px;
            }

            .ranking-content {
                width: 100%;
            }

            .ranking-panel {
                width: 100%;
                animation: rankingFade 0.3s ease;
            }

            .ranking-panel[hidden] {
                display: none;
            }

            .ranking-panel-header {
                margin-bottom: 18px;
                text-align: center;
            }

            .ranking-panel-header h3 {
                margin-bottom: 6px;
            }

            .ranking-panel-header p {
                margin: 0;
            }

            .planilha {
                width: 100%;
                overflow: hidden;
                border-radius: 16px;
                background: #ffffff;

        <!-- tabs -->
        <script>
            const rankingTabs = document.querySelectorAll("[data-ranking-tab]");
            const rankingPanels = document.querySelectorAll(".ranking-panel");

            function abrirRanking(tabSelecionada) {
                const panelId = tabSelecionada.dataset.rankingTab;
                const panelSelecionado = document.getElementById(panelId);

                rankingTabs.forEach((tab) => {
                    const ativa = tab === tabSelecionada;

                    tab.classList.toggle("active", ativa);
                    tab.setAttribute("aria-selected", String(ativa));
                    tab.setAttribute("tabindex", ativa ? "0" : "-1");
                });

                rankingPanels.forEach((panel) => {
                    const ativo = panel === panelSelecionado;

                    panel.classList.toggle("active", ativo);
                    panel.hidden = !ativo;
                });

                /*
                 * Carrega o iframe mensal apenas quando a tab for aberta
                 * pela primeira vez. Isso deixa o carregamento inicial mais leve.
                 */
                const iframe = panelSelecionado.querySelector("iframe[data-src]");

                if (iframe && !iframe.src) {
                    iframe.src = iframe.dataset.src;
                    iframe.removeAttribute("data-src");
                }
            }

            rankingTabs.forEach((tab, index) => {
                tab.addEventListener("click", () => {
                    abrirRanking(tab);
                });

                tab.addEventListener("keydown", (event) => {
                    if (event.key !== "ArrowLeft" && event.key !== "ArrowRight") {
                        return;
                    }

                    event.preventDefault();

                    const direcao = event.key === "ArrowRight" ? 1 : -1;
                    const novoIndex =
                        (index + direcao + rankingTabs.length) % rankingTabs.length;

                    rankingTabs[novoIndex].focus();
                    abrirRanking(rankingTabs[novoIndex]);
                });
            });
        </script>
